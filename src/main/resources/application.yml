
spring:
  application:
    name: ordering-service
  profiles:
    active: ${ENVIRONMENT:local}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ordering?reWriteBatchedInserts=true}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 12          # подгони под concurrency
      minimum-idle: 4
      connection-timeout: 20000      # мс
      idle-timeout: 600000           # мс
      max-lifetime: 1700000          # мс (~28 мин; немного меньше, чем у PG/балансера)
      data-source-properties:
        reWriteBatchedInserts: true
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.jdbc.batch_versioned_data: true
  liquibase:
    change-log: db.changelog/db.changelog-master.yaml
    enabled: true
  output:
    ansi:
      enabled: ALWAYS
  rabbitmq:
    host: localhost
    port: 5672
    username: dev
    password: dev
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
server:
  port: ${SERVER_PORT:8080}
  use-forward-headers: true
  main.allow-bean-definition-overriding: true

app:
  listener:
    batch-size: 100
    prefetch: 200
    concurrency: 3
    max-concurrency: 8
    receive-timeout-ms: 500
  rabbit:
    exchange: ${ORDERS_EXCHANGE:orders.exchange}
    queue: ${ORDER_CREATED_QUEUE:orders.created.queue}
    routing-key: ${ORDER_CREATED:orders.created}
  info:
    application_name: @project.name@
    version: @project.version@
    description: @project.description@
    artifact_Id: @project.artifactId@
    group_Id: @project.groupId@
    app_profile: ${ENVIRONMENT:dev}
    java-version: @java.version@

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${HOSTNAME:localhost}
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_SERVICE_PORT:8091}
  health:
    livenessState:
      enable: true
    readinessState:
      enable: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
#logging:
